<body>
<header>
    <a href="/" class="logo">
        <img src="/favicon.ico" alt="MakuT" class="site-icon">Adderly.Top

            <li><a href="/builds">Сборки</a></li>
            <li><a href="/makutweaker">MakuTweaker</a></li>
            <li><a href="/support">Поддержать</a></li>
        </ul>
    </nav>
</header>

<main>
    <section>
        <h1>Заголовок</h1>
        <p>Текст</p>
        <div class="gallery-row">
            <img src="https://thumbs.dreamstime.com/b/none-214340643.jpg" alt="Изображение">
        </div>
        <hr style="border-color: var(--border-color); margin: 30px 0;">

        <div class="buttons">

        </div>
        <div class="accordion-container">
            <button class="accordion">Комбобоксик</button>
            <div class="panel">
                <div class="panel-content">

                </div>

    <p id="trademark">© 2026 Adderly.Top // Марк Аддерли</p>
</footer>

<script>
    var acc = document.getElementsByClassName("accordion");
    for (var i = 0; i < acc.length; i++) {
        acc[i].addEventListener("click", function() {
            this.classList.toggle("active");
            var panel = this.nextElementSibling;
            if (panel.style.maxHeight) {
                panel.style.maxHeight = null;
            } else {
                panel.style.maxHeight = panel.scrollHeight + "px";
            }
        });
    }
</script>
</body>
